version: '3.8'

services:
  # Frontend React application
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_BASE_URL=http://localhost
    depends_on:
      - backend
    networks:
      - docker-tar-network

  # Backend FastAPI application  
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./back-end:/app
      - /var/run/docker.sock:/var/run/docker.sock # Mount Docker socket
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    networks:
      - docker-tar-network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - docker-tar-network

networks:
  docker-tar-network:
    driver: bridge