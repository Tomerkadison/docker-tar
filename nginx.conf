events {
    worker_connections 1024;
}

http {
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 10s;

    server {
        server_name dockertar.zapto.org;
        listen 80;
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }  
        location /dockerhub/ {
            add_header Access-Control-Allow-Origin *;
            proxy_pass https://hub.docker.com/;

            # Fix 1: Use HTTP/1.1 for proper connection handling
            proxy_http_version 1.1;

            # Fix 2: Disable IPv6 to prevent "Network unreachable" errors
            resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;

            # Fix 3: Prevent connection pooling issues
            proxy_set_header Connection "";
            proxy_socket_keepalive on;

            # Fix 4: Adjust timeouts to be more lenient
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Fix 5: Set server name for SNI
            proxy_ssl_server_name on;

            proxy_intercept_errors on;
            error_page 429 = @dockerhub1;
        }

        location @dockerhub1 {
            add_header Access-Control-Allow-Origin *;
            set $dockerhub_path $request_uri;
            if ($dockerhub_path ~ ^/dockerhub/(.*)$) {
                set $dockerhub_path $1;
            }
            set $cors_url "https%3A%2F%2Fhub.docker.com%2F$dockerhub_path";
            proxy_pass https://corsproxy.io/?url=$cors_url;
            proxy_set_header Host corsproxy.io;
            proxy_ssl_server_name on;
            proxy_intercept_errors on;
            error_page 400 401 402 403 404 405 406 407 408 409 410 411 412 413 414 415 416 417 418 421 422 423 424 425 426 428 429 431 451 500 501 502 503 504 505 506 507 508 510 511 = @dockerhub2;
        }

        location @dockerhub2 {
            add_header Access-Control-Allow-Origin *;
            set $dockerhub_path2 $request_uri;
            if ($dockerhub_path2 ~ ^/dockerhub/(.*)$) {
                set $dockerhub_path2 $1;
            }
            set $cors_url2 "https%3A%2F%2Fhub.docker.com%2F$dockerhub_path2";
            proxy_pass https://api.cors.lol/?url=$cors_url2;
            proxy_set_header Host api.cors.lol;
            proxy_ssl_server_name on;
        }

        location /install {
            proxy_connect_timeout 1200s;
	    proxy_send_timeout 1200s;
            proxy_read_timeout 1200s;
	    send_timeout 1200s;
            proxy_pass http://localhost:8080/install/image-tar;
        }

	    location /backend/metrics {
            proxy_pass http://localhost:8080/metrics;
        } 
		
		location /server/metrics {
        if ($http_authorization != "Bearer yW8zx6Ph87u0S8KidRabVtTHCo0D9l61Xy2et9ZiflOmdLrEEm3UX45ZvVwxhkkx") {
            return 403 "Access Denied: Invalid or missing token";
        }
            proxy_pass http://localhost:9100/metrics;
        } 

        location /report/success {
            proxy_pass http://localhost:8080/success;
        }
    }
}